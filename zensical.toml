# Zensical configuration for the ragpicker documentation site.
# Built with `uv run --group docs zensical build` (output under site/,
# gitignored); preview with `uv run --group docs zensical serve`.
#
# Reference: https://zensical.org/docs/setup/basics/

[project]
site_name = "ragpicker"
site_description = """
Generate a self-contained, filesystem-based agentskills.io skill that wraps a \
haiku-rag-built LanceDB RAG database.
"""
site_author = "Tres Seaver"
site_url = "https://tseaver.github.io/ragpicker/"
repo_url = "https://github.com/tseaver/ragpicker"
repo_name = "tseaver/ragpicker"
copyright = """
Copyright &copy; Tres Seaver
"""

# Use a non-default dev port so this site can run alongside sibling docs sites
# without colliding.
dev_addr = "127.0.0.1:8004"

# Explicit navigation. Pages not listed here still build, but the sidebar
# order/grouping below is the source of truth.
# Reference: https://zensical.org/docs/setup/navigation/
nav = [
    { "Home" = "index.md" },
    { "Generating a skill" = "generating.md" },
    { "Version pinning" = "versions.md" },
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Markdown extensions (admonitions, fenced code, content tabs, etc.). These
# mirror the Zensical default-template set; see
# https://zensical.org/docs/setup/extensions/
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
