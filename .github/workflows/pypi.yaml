name: Publish to PyPI

# Builds the sdist + wheel and publishes them to PyPI via Trusted Publishing
# (OpenID Connect): no API token is stored -- PyPI verifies this workflow's
# identity directly. Configured on PyPI as the 'pypi' environment for the
# 'ragpicker' project, naming this workflow file (pypi.yaml).
#
# Fires when a GitHub Release is published. Use workflow_dispatch to re-run a
# build manually (e.g. to inspect artifacts) without publishing.

on:
  release:
    types: [published]
  workflow_dispatch:

# Allow one publish at a time; let an in-progress run finish.
concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only publish for an actual release, never for a manual dispatch build.
    if: github.event_name == 'release'
    environment: pypi
    # Trusted Publishing exchanges this token for a short-lived PyPI upload
    # credential; no secrets required.
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
